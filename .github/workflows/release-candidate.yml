name: Release Candidate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Keep the workflow-wide default read-only because this workflow also runs for
# pull_request. PR validation checks out and executes repository-controlled
# scripts, so granting the release-capable token at the top level would make the
# trusted release path and the untrusted review path share one credential model.
# The tag-only publish job below opts into write access at job scope instead.
permissions:
  contents: read

env:
  DOCKING_RELEASE_VERSION: "0.0.3"
  DOCKING_RELEASE_ARTIFACT_PREFIX: "Docking-0.0.3-macos26"

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos26-artifacts:
    name: Build macOS 26 artifacts
    runs-on: macos-26
    timeout-minutes: 30
    # This job is the PR-facing path. Keep its permissions explicit even though
    # they match the workflow default so future release edits do not accidentally
    # widen the token that PR-authored scripts can observe.
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        # The local release gate is intentionally sourced from the checked-out
        # tree, so a PR can change it. Avoid persisting the workflow token in the
        # git config; a simpler default checkout would leave credentials behind
        # for later shell steps that do not need to push or fetch private data.
        with:
          persist-credentials: false

      - name: Confirm macOS 26 runner
        run: |
          set -euo pipefail

          runner_version="$(/usr/bin/sw_vers -productVersion)"
          runner_major="${runner_version%%.*}"

          # Docking's pre-release builds deliberately target only macOS 26. Keeping this
          # explicit check in the workflow avoids a quiet downgrade if GitHub
          # ever changes a label or if this file is copied to a broader matrix.
          if [[ "$runner_major" != "26" ]]; then
            echo "Expected a macOS 26 runner, got ${runner_version}." >&2
            exit 1
          fi

          echo "Using macOS ${runner_version}."

      - name: Run local release gate
        run: ./script/release_check.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}-release-candidate
          if-no-files-found: error
          path: |
            dist/${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}.zip
            dist/${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}.zip.sha256
            dist/${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}.dmg
            dist/${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}.dmg.sha256

      - name: Audit Homebrew cask
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail

          # Homebrew audits casks through a tap, not arbitrary file paths. The
          # checked-out repository is already the release tap, so use it
          # directly instead of creating a separate homebrew-* repository for a
          # personal pre-release app.
          #
          # This PR-facing audit deliberately stays offline and tokenless. The
          # tempting alternative is to reuse the workflow token for release-state
          # checks and Homebrew's GitHub API calls, but that would expose a token
          # to a cask and tap tree that a pull request is allowed to modify. The
          # published-release online audit remains in the tag-only job below.
          brew tap sk-226/docking "$GITHUB_WORKSPACE"
          brew audit --cask --strict --tap=sk-226/docking docking

  publish-release:
    name: Publish GitHub Release
    needs: build-macos26-artifacts
    # Only tag pushes are allowed to publish or inspect release state with an
    # elevated token. Pull requests and workflow_dispatch runs still produce
    # workflow artifacts through the read-only build job, but they cannot reach
    # this job's contents: write token.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-26
    timeout-minutes: 15
    permissions:
      # download-artifact reads the artifact produced by the build job. Keep this
      # separate from contents: write so the reason for each permission remains
      # auditable instead of relying on a broad inherited default.
      actions: read
      # GitHub Releases are repository contents, so this permission is required
      # for `gh release create` and `gh release upload`. It is intentionally
      # scoped to the tag-only job rather than the PR-facing build job.
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.DOCKING_RELEASE_ARTIFACT_PREFIX }}-release-candidate
          path: dist

      - name: Attach artifacts to GitHub Release
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          # This job intentionally does not checkout the repository before
          # publishing. The release command only needs the downloaded artifacts,
          # and adding checkout just to recreate a git remote would reintroduce
          # credential-bearing repository state into the write-scoped job.
          # `gh release` cannot infer a repository from a remote that does not
          # exist in this fresh job, so provide the repository context directly.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          expected_tag="v${DOCKING_RELEASE_VERSION}"
          notes_file="$(/usr/bin/mktemp)"
          run_online_audit=false

          if [[ "$tag_name" != "$expected_tag" ]]; then
            # The artifact names and release version are intentionally advanced in
            # lockstep by a release-prep change. Failing here is preferable to
            # accidentally attaching the reviewed 0.0.3 DMG to a different tag
            # just because the workflow trigger accepts every v* tag.
            echo "Expected tag ${expected_tag}, got ${tag_name}." >&2
            exit 1
          fi

          # Tag builds are the only automation path that touches GitHub
          # Releases. Manual workflow_dispatch runs stay as workflow artifacts
          # so release publication remains an explicit tag-driven act.
          {
            echo "Docking ${DOCKING_RELEASE_VERSION} macOS 26 release."
            echo
            echo "Changes:"
            echo "- Refines auto-hide edge reveal behavior for fullscreen and bottom-edge interactions."
            echo
            echo "Artifacts are produced by ./script/release_check.sh on the macos-26 runner."
            echo
            echo "SHA-256:"
            /bin/cat "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.zip.sha256"
            /bin/cat "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.dmg.sha256"
            echo
            echo "This release is created as a draft so the artifact can be checked before publication."
          } >"$notes_file"

          release_is_draft="$(gh release view "$tag_name" --json isDraft --jq '.isDraft' 2>/dev/null || true)"

          if [[ "$release_is_draft" == "true" ]]; then
            # Re-running a tag workflow should replace stale local-candidate
            # artifacts instead of forcing a maintainer to delete assets by
            # hand before the corrected DMG can be reviewed. This branch is
            # limited to draft releases; published releases should not be
            # mutated by a retry of an automation job.
            gh release upload "$tag_name" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.zip" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.zip.sha256" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.dmg" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.dmg.sha256" \
              --clobber
          elif [[ "$release_is_draft" == "false" ]]; then
            # A locally published release may already contain the reviewed DMG
            # and checksum files before the tag workflow starts. In that case
            # the workflow should still prove that GitHub can rebuild the
            # artifacts, but it must not mutate the public release assets behind
            # the maintainer's back.
            echo "Release ${tag_name} already exists and is not a draft; leaving published assets unchanged."
            run_online_audit=true
          else
            gh release create "$tag_name" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.zip" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.zip.sha256" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.dmg" \
              "dist/${DOCKING_RELEASE_ARTIFACT_PREFIX}.dmg.sha256" \
              --draft \
              --title "Docking ${tag_name}" \
              --notes-file "$notes_file"
          fi

          echo "run_online_audit=${run_online_audit}" >>"$GITHUB_OUTPUT"

      - name: Checkout cask for published-release audit
        if: steps.publish.outputs.run_online_audit == 'true'
        uses: actions/checkout@v7
        # Even on the trusted tag path, the online audit only needs the cask
        # file. Persisting git credentials would add a second, unnecessary way
        # for later tooling to reach the write token.
        with:
          persist-credentials: false

      - name: Audit published Homebrew cask
        if: steps.publish.outputs.run_online_audit == 'true'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail

          # `--online` proves the cask URL and checksum against a public GitHub
          # asset. It only runs when the release already exists and is not a
          # draft; draft assets are intentionally private until maintainers have
          # reviewed them, so requiring an online audit earlier would force
          # publication before review.
          brew tap sk-226/docking "$GITHUB_WORKSPACE"
          brew audit --cask --strict --online --tap=sk-226/docking docking
